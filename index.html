<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyStore — Documentación Oficial</title>
  <meta name="description" content="Documentación oficial de EasyStore — addon de guardado modular para Godot 4 con backends Local y Steam Cloud.">
  <meta name="theme-color" content="#3498db">
  <meta property="og:title" content="EasyStore — Documentación Oficial">
  <meta property="og:description" content="EasyStore — Modular save system for Godot 4. Local and Steam Cloud backends under one unified API.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="resources/Logo.svg" type="image/svg+xml">
  <link rel="alternate icon" href="resources/Logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
</head>
<body>

  <!-- ── Site Header ──────────────────────────────────────── -->
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-logo" href="#introduccion">
        <!-- EasyStore logo: save-file icon -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14.49 14.49" aria-hidden="true">
          <!-- document body -->
          <path fill="#3498db" d="M12.71,14.49H1.78c-.98,0-1.78-.8-1.78-1.78V1.78C0,.8.8,0,1.78,0h10.22c.83.83,1.66,1.65,2.49,2.48v10.23c0,.98-.8,1.78-1.78,1.78Z"/>
          <!-- top tab / clip area -->
          <path fill="#fefefe" d="M3.14,0h8.1v1.2c0,1.53-1.24,2.78-2.78,2.78h-2.54c-1.53,0-2.78-1.24-2.78-2.78V0h0Z"/>
          <!-- card / person area -->
          <path fill="#fefefe" d="M5.23,7.91h3.95c1.55,0,2.81,1.26,2.81,2.81v3.77H2.42v-3.77c0-1.55,1.26-2.81,2.81-2.81Z"/>
          <!-- small clip accent -->
          <path fill="#95a5a6" d="M6.77,3.14h-1.7c-.4,0-.72-.32-.72-.72V0h3.14v2.42c0,.4-.32.72-.72.72Z"/>
          <!-- text lines on card -->
          <rect fill="#bdc3c7" x="4" y="9.56" width="6.39" height=".81"/>
          <rect fill="#bdc3c7" x="4" y="11.02" width="6.39" height=".81"/>
          <rect fill="#bdc3c7" x="4.01" y="12.52" width="6.39" height=".81"/>
        </svg>
        <div class="site-logo__text">
          <span class="site-logo__name">EasyStore</span>
          <span class="site-logo__sub">Documentación</span>
        </div>
      </a>

      <div class="site-header__doc-chrome" id="header-doc-chrome"></div>

      <a class="site-github" id="site-github-link" href="https://github.com/IUXGames/EasyStore" target="_blank" rel="noopener noreferrer" aria-label="EasyStore en GitHub">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
      </a>

      <button type="button" class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <!-- ── Overlay para cerrar el sidebar en móvil ───────── -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ── DocShell container ────────────────────────────── -->
  <div id="docs"></div>

  <!-- ── Scripts ───────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="docsShell/hljs-gdscript-register.js"></script>
  <script src="docsShell/doc-shell.js"></script>
  <script src="docsShell/doc-shell-search.js"></script>

  <script>
    const SITE_UI = {
      es: {
        docTitle: 'EasyStore — Documentación oficial',
        copyLabel: 'Copiar',
        copiedLabel: '¡Copiado!',
        searchPlaceholder: 'Buscar en la documentación…',
        searchNoResults: 'Sin resultados.',
        searchAria: 'Buscar en la documentación',
        navAria: 'Documentación',
        langAria: 'Selector de idioma',
        menuOpen: 'Abrir menú de navegación',
        menuClose: 'Cerrar menú de navegación',
        githubAria: 'EasyStore en GitHub',
        typeLabels: {
          h1: 'Título', h2: 'Título', h3: 'Título', h4: 'Título', h5: 'Título', h6: 'Título',
          text: 'Texto', code: 'Código', table: 'Tabla',
        },
      },
      en: {
        docTitle: 'EasyStore — Official documentation',
        copyLabel: 'Copy',
        copiedLabel: 'Copied!',
        searchPlaceholder: 'Search the docs…',
        searchNoResults: 'No results.',
        searchAria: 'Search documentation',
        navAria: 'Documentation',
        langAria: 'Language selector',
        menuOpen: 'Open navigation menu',
        menuClose: 'Close navigation menu',
        githubAria: 'EasyStore on GitHub',
        typeLabels: {
          h1: 'Heading', h2: 'Heading', h3: 'Heading', h4: 'Heading', h5: 'Heading', h6: 'Heading',
          text: 'Text', code: 'Code', table: 'Table',
        },
      },
    };

    function applySiteLanguage(lang) {
      const s = SITE_UI[lang] || SITE_UI.en;
      document.documentElement.lang = lang;
      document.title = s.docTitle;
      document.getElementById('site-github-link')?.setAttribute('aria-label', s.githubAria);
      const menuBtn = document.getElementById('menu-toggle');
      if (menuBtn) {
        const open = menuBtn.classList.contains('is-open');
        menuBtn.setAttribute('aria-label', open ? s.menuClose : s.menuOpen);
      }
      if (typeof ds !== 'undefined' && ds.setCopyLabels) {
        ds.setCopyLabels({ copyLabel: s.copyLabel, copiedLabel: s.copiedLabel });
        ds.setChromeStrings({ navAriaLabel: s.navAria, langSwitcherAriaLabel: s.langAria });
      }
      if (typeof search !== 'undefined' && search.setStrings) {
        search.setStrings({
          placeholder: s.searchPlaceholder,
          noResultsText: s.searchNoResults,
          searchAriaLabel: s.searchAria,
          typeLabels: s.typeLabels,
        });
      }
    }

    let search;

    /** En vista móvil, la búsqueda y el idioma viven en el sidebar (junto al menú hamburguesa). */
    function relocateHeaderDocChrome() {
      const header = document.getElementById('header-doc-chrome');
      const mobile = document.querySelector('.ds-mobile-chrome');
      if (!header || !mobile) return;
      const isMobile = window.matchMedia('(max-width: 768px)').matches;
      if (isMobile) {
        while (header.firstChild) mobile.appendChild(header.firstChild);
      } else {
        while (mobile.firstChild) header.appendChild(mobile.firstChild);
      }
    }

    const ds = new DocShell({
      container: '#docs',
      langs: {
        es: 'docs/es.md',
        en: 'docs/en.md',
      },
      defaultLang: 'es',
      headerChrome: '#header-doc-chrome',
      copyLabel:   SITE_UI.es.copyLabel,
      copiedLabel: SITE_UI.es.copiedLabel,
      navAriaLabel: SITE_UI.es.navAria,
      langSwitcherAriaLabel: SITE_UI.es.langAria,
      onLangChange: (lang) => {
        applySiteLanguage(lang);
      },
    });

    search = new DocShellSearch(ds, {
      placeholder:   SITE_UI.es.searchPlaceholder,
      noResultsText: SITE_UI.es.searchNoResults,
      searchAriaLabel: SITE_UI.es.searchAria,
      typeLabels: SITE_UI.es.typeLabels,
      maxResults: 25,
      snippetLen: 100,
    });

    ds.on('ready', () => {
      relocateHeaderDocChrome();
      search.mount(ds.getSearchSlot());
      applySiteLanguage(ds.getCurrentLang() || 'es');
    });

    let relocateChromeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(relocateChromeTimer);
      relocateChromeTimer = setTimeout(() => {
        relocateHeaderDocChrome();
        if (typeof search !== 'undefined' && search.closeDropdown) search.closeDropdown();
      }, 120);
    });

    /* ── Mobile sidebar toggle ── */
    const menuToggle = document.getElementById('menu-toggle');
    const overlay    = document.getElementById('sidebar-overlay');

    function openSidebar() {
      const root = document.querySelector('.ds-root');
      if (root) root.classList.add('sidebar-open');
      overlay.classList.add('active');
      menuToggle.classList.add('is-open');
    }

    function closeSidebar() {
      const root = document.querySelector('.ds-root');
      if (root) root.classList.remove('sidebar-open');
      overlay.classList.remove('active');
      menuToggle.classList.remove('is-open');
    }

    menuToggle.addEventListener('click', () => {
      const root = document.querySelector('.ds-root');
      if (root && root.classList.contains('sidebar-open')) {
        closeSidebar();
      } else {
        openSidebar();
      }
      const lang = (typeof ds !== 'undefined' && ds.getCurrentLang) ? ds.getCurrentLang() : 'es';
      const s = SITE_UI[lang] || SITE_UI.en;
      menuToggle.setAttribute('aria-label', menuToggle.classList.contains('is-open') ? s.menuClose : s.menuOpen);
    });

    overlay.addEventListener('click', closeSidebar);

    /* Close sidebar when a nav link is clicked on mobile */
    document.addEventListener('click', (e) => {
      if (window.innerWidth < 768 && e.target.classList.contains('ds-nav-link')) {
        closeSidebar();
      }
    });
  </script>
</body>
</html>
